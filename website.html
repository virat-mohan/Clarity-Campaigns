<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClarityHQ Campaign Marketplace</title>
<meta name="description" content="Internal discussion demo — buy a growth pod, configured and priced end to end." />
<!-- Fully self-contained: no external fonts, scripts, or styles. Works offline. -->
<style>
/* ---------------------------------------------------------------------------
   Design tokens — ported verbatim from app/globals.css
--------------------------------------------------------------------------- */
:root {
  --background: #1c1712;
  --foreground: #ece7dd;
  --card: #26201a;
  --card-foreground: #ece7dd;
  --border: #3a3229;
  --border-strong: #4d4235;
  --paper: #f4f1e8;
  --paper-border: #ddd5c4;
  --paper-foreground: #1c1712;
  --muted: #241e18;
  --muted-foreground: #a89f8f;
  --muted-foreground-2: #837a68;
  --primary: #d1a02e;
  --primary-hover: #b8871c;
  --primary-foreground: #1c1712;
  --secondary: #7a8455;
  --secondary-foreground: #1c1712;
  --destructive: #b0553a;
  --destructive-foreground: #f4f1e8;
  --ring: #d1a02e;
  --radius: 0.5rem;
  --radius-card: 1.25rem;
  /* Self-contained font stacks — no web fonts required. Serif display for
     headings, native UI sans for body, native mono for labels. */
  --font-heading: "Fraunces", "Georgia", "Times New Roman", ui-serif, serif;
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, ui-sans-serif, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans), ui-sans-serif, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}
::selection { background: var(--primary); color: var(--primary-foreground); }
a { color: inherit; text-decoration: none; }
main { flex: 1; }

.font-heading { font-family: var(--font-heading), ui-sans-serif, sans-serif; }
.font-mono { font-family: var(--font-mono), ui-monospace, monospace; }
.mono-label {
  font-family: var(--font-mono), ui-monospace, monospace;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.dim { color: var(--muted-foreground); font-weight: inherit; }

/* Alternating page sections */
.section-dark { background: var(--background); color: var(--foreground); }
.section-paper {
  --background: var(--paper);
  --foreground: var(--paper-foreground);
  --card: #ffffff;
  --card-foreground: var(--paper-foreground);
  --muted: #ece6d8;
  --muted-foreground: #6b6353;
  --muted-foreground-2: #8a8272;
  --border: var(--paper-border);
  --border-strong: #cabfa8;
  background: var(--background);
  color: var(--foreground);
}
.wrap { margin: 0 auto; max-width: 1180px; padding-left: 16px; padding-right: 16px; }
.wrap-narrow { margin: 0 auto; max-width: 768px; padding-left: 16px; padding-right: 16px; }
.rounded-top { border-top-left-radius: 2.5rem; border-top-right-radius: 2.5rem; margin-top: -2rem; position: relative; }

/* ---- Header ---- */
header.site {
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid rgba(58,50,41,0.6);
  background: rgba(28,23,18,0.95);
  backdrop-filter: blur(6px);
}
header .bar { display: flex; height: 56px; max-width: 1180px; margin: 0 auto; align-items: center; gap: 12px; padding: 0 16px; }
.logo { display: flex; align-items: center; gap: 8px; font-family: var(--font-heading); font-size: 15px; font-weight: 700; color: var(--foreground); }
.logo .disc { display: grid; height: 24px; width: 24px; place-items: center; border-radius: 9999px; background: rgba(209,160,46,0.15); border: 1px solid rgba(209,160,46,0.4); }
.logo .disc span { height: 8px; width: 8px; border-radius: 9999px; background: var(--primary); }
.pill-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 9999px; background: rgba(209,160,46,0.1); border: 1px solid rgba(209,160,46,0.25); color: var(--primary); }
header .nav { margin-left: auto; display: flex; align-items: center; gap: 16px; }
header .nav a.link { font-size: 12.5px; font-weight: 500; color: var(--muted-foreground); transition: color .15s; }
header .nav a.link:hover { color: var(--foreground); }

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  white-space: nowrap; border-radius: 9999px; font-size: 12.5px; font-weight: 600;
  transition: background-color .15s, color .15s, border-color .15s, opacity .15s;
  cursor: pointer; border: 1px solid transparent; height: 36px; padding: 8px 16px;
  font-family: inherit;
}
.btn:disabled { pointer-events: none; opacity: 0.5; }
.btn-default { background: var(--foreground); color: var(--background); }
.btn-default:hover { opacity: 0.9; }
.btn-accent { background: var(--primary); color: var(--primary-foreground); }
.btn-accent:hover { background: var(--primary-hover); }
.btn-outline { border: 1px solid var(--border-strong); background: transparent; color: inherit; }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 10px; }
.btn-lg { height: 44px; padding: 0 24px; font-size: 12px; }

/* ---- Cards ---- */
.card { border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); color: var(--card-foreground); }
.card-pad { padding: 20px; }
.card-pad-top { padding: 20px 20px 20px; }
.bg-paper { background: var(--paper); border-color: var(--paper-border); color: var(--paper-foreground); }

/* ---- Badges ---- */
.badge { display: inline-flex; align-items: center; border-radius: 3px; border: 1px solid; padding: 2px 8px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; }
.badge-amber { background: rgba(209,160,46,0.1); color: var(--primary); border-color: rgba(209,160,46,0.3); }
.badge-sage { background: rgba(122,132,85,0.12); color: var(--secondary); border-color: rgba(122,132,85,0.3); }
.badge-coral { background: rgba(176,85,58,0.12); color: var(--destructive); border-color: rgba(176,85,58,0.3); }

/* text helpers */
.text-primary { color: var(--primary); }
.text-primary-hover { color: var(--primary-hover); }
.text-secondary { color: var(--secondary); }
.text-destructive { color: var(--destructive); }
.text-muted { color: var(--muted-foreground); }
.text-muted-2 { color: var(--muted-foreground-2); }

/* Screen 1 layout */
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 640px) { .stats { grid-template-columns: repeat(4, 1fr); } }
.stat { border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); padding: 12px 16px; text-align: center; }
.stat .v { font-family: var(--font-heading); font-size: 20px; font-weight: 600; color: var(--primary); }
.stat .l { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted-foreground); }

.flywheel-grid { display: grid; grid-template-columns: 1fr; align-items: center; gap: 32px; }
@media (min-width: 1024px) { .flywheel-grid { grid-template-columns: 380px 1fr; } }
.flywheel-diagram { margin: 0 auto; width: 100%; max-width: 320px; }
.tiles { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 640px) { .tiles { grid-template-columns: repeat(3, 1fr); } }
.tile { border-radius: var(--radius-card); border: 1px solid; background: var(--card); padding: 16px; }

.group-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid; }
.sku-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
@media (min-width: 640px) { .sku-grid.two { grid-template-columns: repeat(2, 1fr); } }
.sku-grid.one { max-width: 384px; }
.sku-card { display: flex; flex-direction: column; justify-content: space-between; border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); padding: 20px; transition: border-color .15s; cursor: pointer; }
.sku-card:hover { border-color: rgba(209,160,46,0.5); }
.sku-card h3 { font-family: var(--font-heading); font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.sku-card .desc { font-size: 13px; color: var(--muted-foreground); line-height: 1.4; margin-bottom: 10px; }
.sku-card .goal { font-size: 11.5px; font-weight: 500; color: var(--primary-hover); margin-bottom: 12px; }
.sku-card .chans { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground-2); margin-bottom: 20px; }
.sku-card .foot { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px; }
.sku-card .price { font-family: var(--font-heading); font-size: 18px; font-weight: 600; color: var(--foreground); }
.sku-card .start { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--primary); transition: transform .15s; }
.sku-card:hover .start { transform: translateX(2px); }

.quiz-cta { margin-top: 32px; display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between; gap: 16px; border-radius: var(--radius-card); border: 1px solid var(--border-strong); background: var(--card); padding: 20px; }
@media (min-width: 640px) { .quiz-cta { flex-direction: row; align-items: center; } }

/* Forms */
label.fld { display: block; font-size: 11.5px; font-weight: 600; color: var(--foreground); margin-bottom: 5px; }
label.fld .req { color: var(--destructive); }
input.inp, textarea.inp, select.inp {
  width: 100%; border-radius: var(--radius); border: 1px solid var(--border-strong);
  background: var(--muted); color: var(--foreground); padding: 8px 10px; font-size: 13px;
  font-family: inherit; transition: border-color .15s; outline: none;
}
input.inp:focus, textarea.inp:focus, select.inp:focus { border-color: var(--primary); }
textarea.inp { min-height: 70px; resize: vertical; }
.grid2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 640px) { .grid2 { grid-template-columns: repeat(2, 1fr); } }
.brief-section { border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); padding: 18px; }
.brief-section > .bs-title { font-family: var(--font-heading); font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.brief-section > .bs-help { font-size: 11px; color: var(--muted-foreground-2); margin-bottom: 12px; }

.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.pill { border-radius: 9999px; border: 1px solid var(--border-strong); background: transparent; color: var(--muted-foreground); padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; }
.pill:hover { border-color: var(--primary); color: var(--foreground); }
.pill.active { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }

.sticky-foot { position: sticky; bottom: 0; z-index: 40; border-top: 1px solid var(--border); background: rgba(28,23,18,0.92); backdrop-filter: blur(8px); }
.sticky-foot .inner { display: flex; max-width: 768px; margin: 0 auto; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 16px; }

.section-head { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
.section-head h1 { font-family: var(--font-heading); font-size: 24px; font-weight: 600; }
.section-head p { font-size: 13px; color: var(--muted-foreground); margin-top: 4px; }

/* Plan */
.plan-block { margin-bottom: 16px; }
.plan-block > .lbl { font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; font-size: 9.5px; color: var(--muted-foreground); margin-bottom: 12px; }
.week-card { border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); overflow: hidden; margin-bottom: 12px; }
.week-card .wh { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--muted); padding: 8px 16px; }
.week-card .wh span { font-family: var(--font-heading); font-size: 13px; font-weight: 600; }
.week-card .wb { padding: 12px 16px; font-size: 12px; color: var(--muted-foreground); line-height: 1.4; }
.pod-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
@media (min-width: 640px) { .pod-grid { grid-template-columns: repeat(2, 1fr); } }
.pod-row { display: flex; align-items: center; justify-content: space-between; border-radius: 4px; border-left: 2px solid var(--primary); background: var(--paper); padding: 10px 12px; }
.pod-row .role { font-size: 12.5px; font-weight: 600; color: var(--paper-foreground); }
.pod-row .hrs { font-family: var(--font-mono); font-size: 11px; color: #8a8272; }
.metric-chip { font-family: var(--font-mono); font-size: 10px; padding: 4px 8px; border-radius: 9999px; background: rgba(209,160,46,0.1); color: var(--primary); border: 1px solid rgba(209,160,46,0.3); }

/* Pay */
.summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 640px) { .summary-grid { grid-template-columns: repeat(3, 1fr); } }
.summary-grid .k { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted-foreground-2); margin-bottom: 2px; }
.summary-grid .v { font-size: 13px; font-weight: 600; }
.deliv { display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; margin-bottom: 6px; }
.check { flex: none; margin-top: 2px; color: var(--secondary); }
.order-row { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
.order-total { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 6px; font-size: 14px; font-weight: 600; }
.trust { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px 16px; font-size: 10.5px; color: var(--muted-foreground-2); }
@media (min-width: 640px) { .pay-btns { flex-direction: row !important; } }

/* Quiz */
.qsteps { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.qstep-pill { font-family: var(--font-mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; padding: 3px 8px; border-radius: 9999px; border: 1px solid var(--border); color: var(--muted-foreground-2); }
.qstep-pill.done { border-color: rgba(122,132,85,0.5); color: var(--secondary); }
.qstep-pill.cur { border-color: var(--primary); color: var(--primary); background: rgba(209,160,46,0.1); }
.opt { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; text-align: left; border: 1px solid var(--border-strong); background: var(--card); color: var(--foreground); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; margin-bottom: 8px; }
.opt:hover { border-color: var(--primary); }
.opt.sel { border-color: var(--primary); background: rgba(209,160,46,0.12); color: var(--primary); }
.opt .tick { opacity: 0; color: var(--primary); font-weight: 700; }
.opt.sel .tick { opacity: 1; }
.meter { height: 10px; border-radius: 9999px; background: var(--muted); overflow: hidden; }
.meter > span { display: block; height: 100%; background: var(--primary); transition: width .4s; }
.rchip { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11.5px; padding: 7px 10px; border-radius: var(--radius); border: 1px solid var(--border); }
.rchip.on { border-color: rgba(122,132,85,0.45); color: var(--foreground); }
.rchip.on .rdot { color: var(--secondary); }
.rchip .rdot { color: var(--muted-foreground-2); font-weight: 700; }
.rec-card { border-radius: var(--radius-card); border: 1px solid var(--border); background: var(--card); padding: 18px; }
.rec-card.top { border-color: var(--primary); background: rgba(209,160,46,0.06); }
.roadmap-step { display: flex; gap: 12px; align-items: flex-start; padding-bottom: 14px; }
.roadmap-dot { flex: none; width: 28px; height: 28px; border-radius: 9999px; display: grid; place-items: center; font-family: var(--font-mono); font-size: 9px; font-weight: 600; border: 1px solid var(--border-strong); color: var(--primary); }
/* FAQ */
.faq-cat-title { font-family: var(--font-mono); font-weight: 600; letter-spacing: .12em; text-transform: uppercase; font-size: 10px; color: var(--primary); margin: 22px 0 8px; }
.faq-item { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; background: var(--card); }
.faq-q { display: flex; justify-content: space-between; gap: 12px; width: 100%; text-align: left; padding: 13px 15px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--foreground); border: none; font-family: inherit; }
.faq-q .chev { flex: none; color: var(--muted-foreground-2); transition: transform .2s; }
.faq-item.open .faq-q .chev { transform: rotate(180deg); }
.faq-a { padding: 0 15px 13px; font-size: 12.5px; color: var(--muted-foreground); line-height: 1.65; }
.faq-a p { margin-bottom: 8px; }
.flag { display: inline-block; margin-left: 6px; font-family: var(--font-mono); font-size: 8.5px; padding: 1px 5px; border-radius: 3px; background: rgba(176,85,58,0.12); color: var(--destructive); border: 1px solid rgba(176,85,58,0.3); vertical-align: middle; }

.hidden { display: none !important; }
.mb2 { margin-bottom: 8px; } .mb3 { margin-bottom: 12px; } .mb4 { margin-bottom: 16px; } .mb6 { margin-bottom: 24px; }
.mt3 { margin-top: 12px; } .mt4 { margin-top: 16px; }
.py14 { padding-top: 56px; padding-bottom: 56px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.footer-note { text-align: center; padding: 40px 16px; font-size: 11px; color: var(--muted-foreground-2); border-top: 1px solid var(--border); }
</style>
</head>

<script>
/* ===========================================================================
   Data — ported from lib/data (campaign-types, campaign-flow-copy,
   campaign-plan-details, campaign-brief-fields, industry-benchmarks)
=========================================================================== */
const CAMPAIGN_TYPES = {

const FLOW_COPY = {

const SKU_TO_SLUG = { abm:"outbound-sales", social:"social-organic", content:"content-led", performance:"performance-marketing", retention:"customer-retention" };
const SLUG_TO_SKU = Object.fromEntries(Object.entries(SKU_TO_SLUG).map(([k,v])=>[v,k]));

const PLAN_DETAILS = {

const STORE_KEY = "clarity-start-flow";
const defaultState = () => ({
  selectedSku:null, preset:"standard",

let state = load();
function load(){ try { return Object.assign(defaultState(), JSON.parse(localStorage.getItem(STORE_KEY)||"{}")); } catch(e){ return defaultState(); } }
function save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){} }

const esc = (s) => String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const app = document.getElementById("app");

/* Router */
function go(screen, sku){
  if (sku) { state.selectedSku = sku; save(); }
  window.scrollTo(0,0);
  if (screen === "start") renderStart();
  else if (screen === "brief") renderBrief();
  else if (screen === "plan") renderPlan();
  else if (screen === "pay") renderPay();
  else if (screen === "quiz") renderQuiz();
  else if (screen === "faq") renderFaq();
  else if (screen === "campaigns") renderMyCampaigns();
  else if (screen === "portal") renderClientPortal();
  else if (screen === "admin") renderAdmin();
  const sluggable = ["brief","plan","pay"].includes(screen);
  location.hash = screen + (sluggable && state.selectedSku ? "/"+SKU_TO_SLUG[state.selectedSku] : "");
}

/* ---------------------------------------------------------------------------
   Flywheel SVG — ported from components/flywheel-diagram.tsx
--------------------------------------------------------------------------- */
function flywheelSVG(){
  const SIZE=580, C=290, CENTER_R=98, TICK_IN=118, TICK_OUT=132, CREAM_R=140, INNER_R=146, OUTER_R=210, MID_R=178, RING_R=252, GAP=14, ARC=360/3-GAP, TIP=7;
  const polar=(r,a)=>{const rad=((a-90)*Math.PI)/180;return {x:C+r*Math.cos(rad),y:C+r*Math.sin(rad)};};
  const f=p=>`${p.x.toFixed(2)} ${p.y.toFixed(2)}`;
  const band=(a0,a1)=>{const o0=polar(OUTER_R,a0),o1=polar(OUTER_R,a1),tip=polar(MID_R,a1+TIP),i1=polar(INNER_R,a1),i0=polar(INNER_R,a0),large=a1-a0>180?1:0;
    return [`M ${f(o0)}`,`A ${OUTER_R} ${OUTER_R} 0 ${large} 1 ${f(o1)}`,`L ${f(tip)}`,`L ${f(i1)}`,`A ${INNER_R} ${INNER_R} 0 ${large} 0 ${f(i0)}`,"Z"].join(" ");};
  const labelPath=(a0,a1,flip)=>{const[s,e]=flip?[a1,a0]:[a0,a1];const sweep=flip?0:1;return `M ${f(polar(MID_R,s))} A ${MID_R} ${MID_R} 0 0 ${sweep} ${f(polar(MID_R,e))}`;};
  const STAGES=[{key:"acquisition",label:"ACQUISITION",start:240,fill:"#aeb98d",stroke:"#7f8f5f"},{key:"conversion",label:"CONVERSION",start:0,fill:"#d3a3a3",stroke:"#b57e7e"},{key:"retention",label:"RETENTION",start:120,fill:"#9aa7b6",stroke:"#75849a"}];
  let defs="";
  STAGES.forEach(s=>{const end=s.start+ARC,mid=((s.start+end)/2)%360,flip=mid>90&&mid<270;defs+=`<path id="fw-${s.key}" d="${labelPath(s.start+8,end-8,flip)}" fill="none"/>`;});
  let ticks=""; for(let i=0;i<48;i++){const a=i*7.5,p1=polar(TICK_IN,a),p2=polar(TICK_OUT,a);ticks+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#e0d3ad" stroke-width="1"/>`;}
  let dots=""; for(let i=0;i<16;i++){const p=polar(i%2===0?110:128,i*22.5+11);dots+=`<circle cx="${p.x}" cy="${p.y}" r="2.2" opacity="0.75" fill="${i%2===0?'#d1a02e':'#d3a3a3'}"/>`;}
  let orbit=""; for(let i=0;i<8;i++){const p=polar(RING_R,i*45+10);orbit+=`<circle cx="${p.x}" cy="${p.y}" r="3.2" fill="#d1a02e"/>`;}
  const bands=STAGES.map(s=>`<path d="${band(s.start,s.start+ARC)}" fill="${s.fill}" stroke="${s.stroke}" stroke-width="1" stroke-linejoin="round"/>`).join("");
  const labels=STAGES.map(s=>`<text font-family="var(--font-mono)" font-size="19" font-weight="700" letter-spacing="4" fill="#ffffff"><textPath href="#fw-${s.key}" startOffset="50%" text-anchor="middle" dominant-baseline="middle">${s.label}</textPath></text>`).join("");
  return `<svg viewBox="0 0 ${SIZE} ${SIZE}" width="100%" height="100%" role="img" aria-label="Brand Intelligence flywheel: Acquisition, Conversion, Retention">
    <defs><style>@keyframes fw-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}.fw-orbit{transform-origin:${C}px ${C}px;animation:fw-spin 40s linear infinite}@media (prefers-reduced-motion:reduce){.fw-orbit{animation:none}}</style>${defs}</defs>
    <circle cx="${C}" cy="${C}" r="${RING_R}" fill="none" stroke="#c9c2b2" stroke-width="1"/>
    <g class="fw-orbit">${orbit}</g>
    <circle cx="${C}" cy="${C}" r="${CREAM_R}" fill="#faf6ea" stroke="#e6dcc2" stroke-width="1"/>
    ${ticks}${dots}${bands}${labels}
    <circle cx="${C}" cy="${C}" r="${CENTER_R}" fill="#14110d"/>
    <text x="${C}" y="${C-38}" text-anchor="middle" font-size="20" fill="#d1a02e">✦</text>
    <text x="${C}" y="${C-4}" text-anchor="middle" font-family="var(--font-heading)" font-size="19" font-weight="700" letter-spacing="1" fill="#f4f1e8">BRAND</text>
    <text x="${C}" y="${C+22}" text-anchor="middle" font-family="var(--font-heading)" font-size="19" font-weight="700" letter-spacing="1" fill="#f4f1e8">INTELLIGENCE</text>
    <text x="${C}" y="${C+50}" text-anchor="middle" font-family="var(--font-mono)" font-size="10" letter-spacing="2" fill="#8a8272">EVERY TURN, SMARTER</text>
  </svg>`;
}

function buildPlan(){
  const bb=state.brandBasics;
  const missing = [ !bb.brandName.trim()&&"Brand name", !bb.country&&"Country", !bb.industry&&"Industry" ].filter(Boolean);
  const err=document.getElementById("brief-error");
  if (missing.length){
    err.innerHTML = `<div class="card mb4" style="border-color:rgba(176,85,58,0.4)"><div class="card-pad" style="font-size:12.5px;color:var(--destructive)">Please fill in: ${missing.join(", ")} before continuing.</div></div>`;
    err.scrollIntoView({behavior:"smooth",block:"center"});
    return;
  }
  go("plan");
}

function addW(t,w){ if(!w) return; for(const k in w){ if(k in t) t[k]+=w[k]; } }
function resolveChannels(sel){ const clean=(sel||[]).filter(c=>c!=="none"); if(clean.length===0) return SCORING.channelCombos.none; if(clean.length===1 && SCORING.channelCombos[clean[0]]) return SCORING.channelCombos[clean[0]]; return {}; }
function resolveAssets(missing){ const r={}; (missing||[]).forEach(a=>{ const p=SCORING.assetPenalties[a]; if(!p) return; for(const k in p) r[k]=(r[k]||0)+p[k]; }); return r; }
function calcScores(ans){ const s=emptyScores(); SINGLE_KEYS.forEach(k=>{ const v=ans[k]; if(v) addW(s, SCORING.questions[k][v]); }); addW(s, resolveChannels(ans.current_channels)); addW(s, resolveAssets(ans.missing_assets)); return s; }
function getRecommendations(ans){ const scores=calcScores(ans); const all=SCORING.campaigns.map(id=>({id,score:scores[id]})).sort((a,b)=>b.score-a.score); const top=all.slice(0,3); const sum=top.reduce((a,r)=>a+Math.max(r.score,0),0); const highest=Math.max(top[0]?top[0].score:0,0); const conf=sum>0?highest/sum:0; return { top, confidence:conf, confidenceLabel:`${Math.round(conf*100)}% Match`, all }; }
function calcReadiness(inputs){ const rows=Object.entries(SCORING.readinessComponents).map(([id,max])=>{ const present=Boolean(inputs[id]); const q=READINESS_QUESTIONS.find(r=>r.id===id); return { id, label:q?q.label:id, points:present?max:0, maxPoints:max, present }; }); const overall=rows.reduce((a,r)=>a+r.points,0); return { overall, max:SCORING.readinessMax, components:rows }; }
function getRoadmap(ans){ const scores=calcScores(ans); const order=["acquisition","conversion","retention"]; const steps=[]; let m=1; order.forEach(stage=>{ SCORING.campaigns.filter(id=>SCORING.flywheelStage[id]===stage).sort((a,b)=>scores[b]-scores[a]).forEach(cid=>{ steps.push({stage, campaign:cid, monthLabel:`Month ${m}`}); m++; }); }); return steps; }

let quiz = { step:0, answers:{}, readiness:{} };
function startQuiz(){ quiz = { step:0, answers:{}, readiness:{} }; go("quiz"); }
function quizPick(key,val){ quiz.answers[key]=val; quiz.step++; window.scrollTo(0,0); renderQuiz(); }
function quizToggle(key,val){ const arr=quiz.answers[key]||[]; const i=arr.indexOf(val); if(i>=0) arr.splice(i,1); else arr.push(val); quiz.answers[key]=arr; renderQuiz(); }
function quizReadyToggle(id){ quiz.readiness[id]=!quiz.readiness[id]; renderQuiz(); }
function quizNext(){ quiz.step++; window.scrollTo(0,0); renderQuiz(); }
function quizBack(){ if(quiz.step>0){ quiz.step--; window.scrollTo(0,0); renderQuiz(); } else go("start"); }

function renderQuiz(){
  const total = QUIZ_QUESTIONS.length + 1; // + readiness
  const pills = QUIZ_QUESTIONS.map((q,i)=>{
    const cls = i<quiz.step ? "done" : i===quiz.step ? "cur" : "";
    return `<span class="qstep-pill ${cls}">${esc(q.short)}</span>`;
  }).join("") + `<span class="qstep-pill ${quiz.step>QUIZ_QUESTIONS.length?"done":quiz.step===QUIZ_QUESTIONS.length?"cur":""}">Readiness</span>`;

  // ---- Question steps ----
  if (quiz.step < QUIZ_QUESTIONS.length) {
    const q = QUIZ_QUESTIONS[quiz.step];
    const isMulti = q.type === "multi";
    const sel = isMulti ? (quiz.answers[q.key]||[]) : quiz.answers[q.key];
    const opts = q.options.map(o=>{
      const on = isMulti ? sel.includes(o.value) : sel===o.value;
      const handler = isMulti ? `quizToggle('${q.key}','${o.value}')` : `quizPick('${q.key}','${o.value}')`;
      return `<button class="opt ${on?"sel":""}" onclick="${handler}"><span>${esc(o.label)}</span><span class="tick">✓</span></button>`;
    }).join("");
    app.innerHTML = `
    <div class="wrap-narrow" style="padding-top:36px;padding-bottom:48px">
      <div class="mono-label text-primary" style="font-size:10px;margin-bottom:10px">Find your campaign · Step ${quiz.step+1} of ${total}</div>
      <div class="qsteps">${pills}</div>
      <h1 class="font-heading" style="font-size:22px;font-weight:600;margin-bottom:4px">${esc(q.label)}</h1>
      ${q.helper?`<p style="font-size:12px;color:var(--muted-foreground-2);margin-bottom:16px">${esc(q.helper)}</p>`:`<div style="height:12px"></div>`}
      <div>${opts}</div>
      <div class="flex-between" style="margin-top:18px">
        <button class="btn btn-outline" onclick="quizBack()">← Back</button>
        ${isMulti?`<button class="btn btn-default" onclick="quizNext()">Next →</button>`:`<span style="font-size:11px;color:var(--muted-foreground-2)">Pick one to continue</span>`}
      </div>
    </div>`;
    return;
  }

  // ---- Readiness step ----
  if (quiz.step === QUIZ_QUESTIONS.length) {
    const rows = READINESS_QUESTIONS.map(r=>{
      const on = Boolean(quiz.readiness[r.id]);
      return `<button class="opt ${on?"sel":""}" onclick="quizReadyToggle('${r.id}')">
        <span><span style="display:block">${esc(r.label)}</span><span style="display:block;font-size:11px;font-weight:400;color:var(--muted-foreground-2)">${esc(r.helper)}</span></span>
        <span class="tick">✓</span></button>`;
    }).join("");
    app.innerHTML = `
    <div class="wrap-narrow" style="padding-top:36px;padding-bottom:48px">
      <div class="mono-label text-primary" style="font-size:10px;margin-bottom:10px">Find your campaign · Step ${total} of ${total}</div>
      <div class="qsteps">${pills}</div>
      <h1 class="font-heading" style="font-size:22px;font-weight:600;margin-bottom:4px">Which of these do you already have?</h1>
      <p style="font-size:12px;color:var(--muted-foreground-2);margin-bottom:16px">This sets your Readiness Score — how prepared you are to launch. Tick everything that's in place.</p>
      <div>${rows}</div>
      <div class="flex-between" style="margin-top:18px">
        <button class="btn btn-outline" onclick="quizBack()">← Back</button>
        <button class="btn btn-default" onclick="quizNext()">See my results →</button>
      </div>
    </div>`;
    return;
  }

  // ---- Results ----
  const rec = getRecommendations(quiz.answers);
  const readiness = calcReadiness(quiz.readiness);
  const roadmap = getRoadmap(quiz.answers);
  const pct = Math.round((readiness.overall/readiness.max)*100);

  const recCards = rec.top.map((r,i)=>{
    const sku = CAMPAIGN_ID_TO_SKU[r.id];
    const copy = FLOW_COPY[sku], ct = CAMPAIGN_TYPES[sku];
    const isTop = i===0;
    const matchPct = rec.confidence>0 ? Math.round((Math.max(r.score,0)/rec.top.reduce((a,x)=>a+Math.max(x.score,0),0))*100) : 0;
    return `<div class="rec-card ${isTop?"top":""}">
      <div class="flex-between mb2">
        <span class="badge ${STAGE_BADGE[ct.flywheelStage]||"badge-amber"}">${isTop?"Best match":"Also strong"}</span>
        <span class="font-mono" style="font-size:11px;color:${isTop?"var(--primary)":"var(--muted-foreground-2)"}">${matchPct}% match</span>
      </div>
      <h3 class="font-heading" style="font-size:${isTop?"19":"16"}px;font-weight:600;margin-bottom:4px">${esc(ct.label)}</h3>
      <p style="font-size:12.5px;color:var(--muted-foreground);line-height:1.45;margin-bottom:12px">${esc(copy.description)}</p>
      <div class="flex-between">
        <span class="font-heading" style="font-size:16px;font-weight:600">$${copy.price}</span>
        <button class="btn ${isTop?"btn-accent":"btn-outline"} btn-sm" onclick="go('brief','${sku}')">${isTop?"Start this campaign →":"View →"}</button>
      </div>
    </div>`;
  }).join("");

  const readinessChips = readiness.components.map(c=>`<div class="rchip ${c.present?"on":""}"><span>${esc(c.label)}</span><span class="rdot">${c.present?"✓ "+c.points:"—"}</span></div>`).join("");

  const roadmapSteps = roadmap.map((s,i)=>{
    const sku = CAMPAIGN_ID_TO_SKU[s.campaign];
    const stageCap = s.stage.charAt(0).toUpperCase()+s.stage.slice(1);
    return `<div class="roadmap-step">
      <div class="roadmap-dot">${i+1}</div>
      <div style="flex:1;border-bottom:1px solid var(--border);padding-bottom:12px">
        <div class="font-mono" style="font-size:9.5px;color:var(--muted-foreground-2);text-transform:uppercase;letter-spacing:.08em">${s.monthLabel} · ${stageCap}</div>
        <div style="font-size:13px;font-weight:600">${esc(campaignLabel(s.campaign))}</div>
      </div>
    </div>`;
  }).join("");

  const readinessNote = pct>=80 ? "You're launch-ready — any motion will run smoothly."
    : pct>=50 ? "Solid foundation — a couple of gaps to close as you go."
    : "Some essentials are missing — your Campaign Lead will help set them up in week 1.";

  app.innerHTML = `
  <div class="wrap-narrow" style="padding-top:36px;padding-bottom:48px">
    <div class="section-head">
      <div class="mono-label text-primary" style="font-size:10px;margin-bottom:4px">Your recommendation · ${esc(rec.confidenceLabel)}</div>
      <h1>Here's where to start</h1>
      <p>Scored from your answers across ${QUIZ_QUESTIONS.length} questions. Top match first, with two strong alternatives.</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr;gap:12px" class="mb6">${recCards}</div>

    <div class="plan-block">
      <div class="lbl" style="font-family:var(--font-mono);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:9.5px;color:var(--muted-foreground);margin-bottom:12px">Readiness score</div>
      <div class="card"><div class="card-pad">
        <div class="flex-between mb2"><span style="font-size:13px;font-weight:600">${readiness.overall} / ${readiness.max}</span><span style="font-size:11px;color:var(--muted-foreground-2)">${pct}% ready</span></div>
        <div class="meter mb3"><span style="width:${pct}%"></span></div>
        <p style="font-size:12px;color:var(--muted-foreground);margin-bottom:12px">${readinessNote}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${readinessChips}</div>
      </div></div>
    </div>

    <div class="plan-block">
      <div class="lbl" style="font-family:var(--font-mono);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:9.5px;color:var(--muted-foreground);margin-bottom:12px">Suggested roadmap</div>
      <div class="card"><div class="card-pad">
        <p style="font-size:12px;color:var(--muted-foreground);margin-bottom:14px">Run these in order to turn the flywheel — Acquisition → Conversion → Retention.</p>
        ${roadmapSteps}
      </div></div>
    </div>

    <div class="flex-between" style="border-top:1px solid var(--border);padding-top:18px;margin-top:8px">
      <button class="btn btn-outline" onclick="startQuiz()">↺ Retake quiz</button>
      <a href="https://meetings-na2.hubspot.com/virat-mohan" target="_blank" rel="noopener noreferrer" class="btn btn-outline btn-sm">Talk to us</a>
    </div>
  </div>`;
}

    <div class="card"><div class="card-pad">
      <div class="mono-label" style="font-size:9.5px;color:var(--muted-foreground);margin-bottom:10px">Campaign catalogue</div>
      ${Object.keys(CAMPAIGN_TYPES).map(id=>{const ct=CAMPAIGN_TYPES[id],copy=FLOW_COPY[id];return `<div class="order-row"><span>${esc(ct.label)} <span class="text-muted-2" style="font-size:11px">· ${ct.flywheelStage}</span></span><span class="font-mono">$${copy.price}</span></div>`;}).join("")}
    </div></div>
    <div class="flex-between" style="border-top:1px solid var(--border);padding-top:18px;margin-top:18px">
      <button class="btn btn-outline" onclick="go('start')">← Back to site</button>
    </div>
  </div>`;
}

/* Boot — restore from hash if present */
(function boot(){
  const h = location.hash.replace(/^#/,"");
  const [screen, slug] = h.split("/");
  if (slug && SLUG_TO_SKU[slug]) state.selectedSku = SLUG_TO_SKU[slug];
  if (["brief","plan","pay"].includes(screen) && state.selectedSku) go(screen);
  else if (["faq","campaigns","portal","admin"].includes(screen)) go(screen);
  else renderStart();
})();
</script>
</body>
</html>
